{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h4>{{ quiz.title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {% for question in questions %}
                    <div class="mb-4 p-3 border rounded">
                        <p><strong>{{ forloop.counter }}. 
                            {{ question.question_text }}
                        </strong></p>
                        <div class="form-check">
                            <input type="radio"
                                   class="form-check-input"
                                   name="question_{{ question.id }}"
                                   value="a" required>
                            <label class="form-check-label">
                                A) {{ question.option_a }}
                            </label>
                        </div>
                        <div class="form-check">
                            <input type="radio"
                                   class="form-check-input"
                                   name="question_{{ question.id }}"
                                   value="b">
                            <label class="form-check-label">
                                B) {{ question.option_b }}
                            </label>
                        </div>
                        <div class="form-check">
                            <input type="radio"
                                   class="form-check-input"
                                   name="question_{{ question.id }}"
                                   value="c">
                            <label class="form-check-label">
                                C) {{ question.option_c }}
                            </label>
                        </div>
                        <div class="form-check">
                            <input type="radio"
                                   class="form-check-input"
                                   name="question_{{ question.id }}"
                                   value="d">
                            <label class="form-check-label">
                                D) {{ question.option_d }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                    <button type="submit"
                            class="btn btn-dark w-100">
                        Submit Quiz
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
