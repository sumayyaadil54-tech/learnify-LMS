{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-8">
        <h2>{{ lesson.title }}</h2>
        <hr>

         {% if lesson.video_url %}
           <div class="ratio ratio-16x9 mb-4">
               <iframe 
                    src="{{ lesson.video_url|cut:'watch?v='|cut:'youtu.be/'}}
                    {{ lesson.video_url|cut:'https://www.youtube.com/'|cut:'https://youtu.be/' }}"
                          allowfullscreen>
                      </iframe>
            </div>

        {% endif %}

        <div class="card">
            <div class="card-body">
                <h5>Lesson Content</h5>
                <p>{{ lesson.content }}</p>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h5>Course Lessons</h5>
            </div>
            <div class="card-body">
                {% for l in lesson.course.lessons.all %}
                <div class="mb-2">
                    <a href="{% url 'lesson_detail' l.pk %}"
                       class="{% if l.pk == lesson.pk %}fw-bold{% endif %}">
                        {{ l.order }}. {{ l.title }}
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="mt-3">
            <a href="{% url 'course_detail' lesson.course.pk %}"
               class="btn btn-outline-dark w-100">
                Back to Course
            </a>
            <a href="{% url 'quiz_list' lesson.course.pk %}"
               class="btn btn-dark w-100 mt-2">
                Take Quiz
            </a>
        </div>
    </div>
</div>
{% endblock %}
