{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4>Cancel Enrollment</h4>
            </div>
            <div class="card-body">
                <p>Are you sure you want to cancel enrollment in:</p>
                <h5>{{ enrollment.course.title }}</h5>
                <hr>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" 
                            class="btn btn-danger w-100 mb-2">
                        Yes, Cancel Enrollment
                    </button>
                    <a href="{% url 'my_courses' %}" 
                       class="btn btn-outline-dark w-100">
                        Go Back
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
