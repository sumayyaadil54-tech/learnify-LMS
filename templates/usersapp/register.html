{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="auth-card">
        <h2 class="auth-title">Create Account</h2>
        
        <form method="POST" class="form-group">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger p-2 rounded">
                    Please correct the errors below.
                </div>
            {% endif %}
            
            {{ form.as_p }}
            
            <button type="submit" class="btn-auth">Register</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted small">Already have an account? <a href="{% url 'login' %}" class="text-primary font-weight-bold" style="text-decoration:none;">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
