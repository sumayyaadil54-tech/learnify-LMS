{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-header bg-dark text-white">
                <h4>Login</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" 
                            class="btn btn-dark w-100">
                        Login
                    </button>
                </form>
                <p class="mt-3 text-center">
                    No account? 
                    <a href="{% url 'register' %}">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
